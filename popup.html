<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Music 主题</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #fa233b;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(17, 19, 26, 0.08);
      --text: #11131a;
      --subtle: rgba(17, 19, 26, 0.58);
      --shadow: 0 18px 44px rgba(17, 19, 26, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 360px;
      min-height: 100vh;
      padding: 16px;
      font-family: "SF Pro Display", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 120, 142, 0.24), transparent 36%),
        linear-gradient(180deg, #fdfdfe 0%, #f4f6fb 100%);
    }

    .panel {
      padding: 16px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .summary {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--subtle);
    }

    .section {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--subtle);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .label-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .label {
      font-size: 14px;
      font-weight: 600;
    }

    .hint {
      font-size: 12px;
      line-height: 1.4;
      color: var(--subtle);
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      border-radius: 999px;
      background: rgba(17, 19, 26, 0.12);
      transition: background 0.2s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 4px;
      top: 4px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 6px 12px rgba(17, 19, 26, 0.18);
      transition: transform 0.2s ease;
    }

    .switch input:checked + .slider {
      background: linear-gradient(135deg, #ff576f, var(--accent));
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--subtle);
    }

    .status.success {
      color: #12824c;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">主题插件</div>
    <h1>Apple Music 主题</h1>
    <p class="summary">将 MoeKoe Music 调整为更接近 Apple Music 的侧边栏、毛玻璃内容区与悬浮播放器布局。</p>

    <section class="section">
      <h2 class="section-title">开关</h2>

      <div class="toggle-row">
        <div class="label-group">
          <span class="label">启用主题</span>
          <span class="hint">应用完整的 Apple Music 风格布局。</span>
        </div>
        <label class="switch">
          <input id="enabledToggle" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <div id="statusText" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
